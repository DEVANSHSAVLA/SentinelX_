apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinelx-api-gateway-hpa
  namespace: sentinelx-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinelx-api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scam-detection-hpa
  namespace: sentinelx-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scam-detection-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
