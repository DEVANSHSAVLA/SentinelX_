apiVersion: apps/v1
kind: Deployment
metadata:
  name: scam-detection-service
  namespace: sentinelx-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scam-detection
  template:
    metadata:
      labels:
        app: scam-detection
    spec:
      containers:
        - name: scam-detection
          image: sentinelx/scam-detection:v7.0.0
          ports:
            - containerPort: 8001
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: scam-detection-svc
  namespace: sentinelx-system
spec:
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: scam-detection
